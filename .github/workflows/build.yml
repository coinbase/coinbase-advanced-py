name: Build and Test

on: [push]

permissions:
  contents: read

jobs:
  format-code:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

    - name: Install dependencies and format code
      run: |
        sudo apt-get install -y make
        pip3 install -r lint_requirements.txt
        make format

        if git diff --quiet; then
          echo "No code formatting changes detected."
        else
          echo "Code formatting changes detected. Please run 'make format' locally and commit the changes."
          git diff --exit-code
          exit 1
        fi

  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863 # v2.12.1
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

    - name: Set up Python environment
      uses: actions/setup-python@3542bca2639a428e1796aaa6a2ffef0c0f575566 # v3.1.4
      with:
        python-version: 3.9

    - name: Install dependencies and run tests
      run: |
        python -m venv venv
        source venv/bin/activate
        pip3 install --upgrade pip
        pip3 install -r requirements.txt
        pip3 install -r test_requirements.txt

        python -m unittest discover -v